name: EnQrypta Crypto Scan

on:
  workflow_dispatch:
    inputs:
      api-url:
        description: EnQrypta API URL
        required: true
        type: string
      notification-email:
        description: Email recipient
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  scan:
    uses: dhyey-qvh/enqrypta-actions/.github/workflows/enqrypta-opengrep.yml@enqrypta-opengrep-workflow-v1
    with:
      api-url: ${{ inputs.api-url }}
      notify-on-complete: true
      notification-email: ${{ inputs.notification-email }}
